name: Nova CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Verify dependencies
        run: |
          jq --version
          curl --version | head -1

      - name: Run tests
        run: bash tests/test-scripts.sh

      - name: Run self-verification tests
        run: bash tests/test-self-verify.sh
